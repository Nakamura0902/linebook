<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>予約確認</title>
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/liff.css">
  <script>
    window.LIFF_ID = "2009586205-CyS3JZM7";
    window.API_BASE = "/api/v1";
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .liff-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.35);
    }
    .liff-header .header-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay">読み込み中...</div>

  <header class="liff-header">
    <div>予約確認</div>
    <div class="header-sub">ご予約の確認・取消</div>
  </header>

  <div class="liff-content">
    <div id="reservations-list"></div>
  </div>

  <div class="liff-footer">
    <a href="booking.html" id="btn-book" class="btn-line" style="display:none">新しく予約する</a>
    <button class="btn-line" onclick="liff.closeWindow()" id="btn-close">LINEに戻る</button>
  </div>

  <script src="js/liff-init.js"></script>
  <script>
    const storeId = getStoreId();

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const ready = await initLiff();
        if (!ready) return;

        const customerData = await liffApi.post(
          `/liff/customers/identify?store_id=${storeId}`, {}
        );
        const customer = customerData.customer;

        const reservations = await liffApi.get(`/liff/customers/${customer.id}/reservations`);

        document.getElementById("loading-overlay").style.display = "none";

        const listEl = document.getElementById("reservations-list");

        if (!reservations.length) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📅</div>
              <div class="empty-title">予約がありません</div>
              <div class="empty-sub">新しい予約を作成してみましょう</div>
            </div>
          `;
          const btnBook = document.getElementById("btn-book");
          btnBook.href = `booking.html?store_id=${storeId}`;
          btnBook.style.display = "flex";
          document.getElementById("btn-close").style.flex = "none";
          document.getElementById("btn-close").style.padding = "15px 20px";
          return;
        }

        // 予約を直近/過去に分類
        const now = new Date();
        const upcoming = reservations.filter(r =>
          ["confirmed","pending"].includes(r.status) && new Date(r.start_datetime) >= now
        );
        const past = reservations.filter(r =>
          !["confirmed","pending"].includes(r.status) || new Date(r.start_datetime) < now
        );

        let html = "";

        if (upcoming.length) {
          html += `<div class="res-section-title">直近の予約</div>`;
          html += upcoming.map(r => renderCard(r, false)).join("");
        }

        if (past.length) {
          html += `<div class="res-section-title">過去の予約</div>`;
          html += past.map(r => renderCard(r, true)).join("");
        }

        listEl.innerHTML = html;

      } catch (err) {
        document.getElementById("loading-overlay").style.display = "none";
        showError(err.message);
      }
    });

    function renderCard(r, isPast) {
      const statusInfo = {
        confirmed: { label: "確定",    cls: "confirmed" },
        pending:   { label: "確認待ち", cls: "pending"   },
        cancelled: { label: "取消済み", cls: "cancelled" },
        completed: { label: "完了",    cls: "completed" },
        no_show:   { label: "無断欠席", cls: "no_show"   },
      };
      const s = statusInfo[r.status] || { label: r.status, cls: "completed" };
      const cardCls = isPast ? (r.status === "cancelled" ? "cancelled" : "past") : "";

      return `
        <div class="reservation-card ${cardCls}">
          <div class="res-header">
            <div>
              <div class="res-date">${formatDateJa(r.start_datetime)}</div>
              <div class="res-time">${formatTime(r.start_datetime)}</div>
            </div>
            <span class="res-badge ${s.cls}">${s.label}</span>
          </div>
          <div class="res-detail">
            ${r.menu_name ? `<strong>${escapeHtml(r.menu_name)}</strong>` : ""}
            ${r.staff_name ? ` · ${escapeHtml(r.staff_name)}` : " · 指名なし"}
          </div>
          <div class="res-code">予約番号: ${r.confirmation_code || "—"}</div>
          ${["confirmed","pending"].includes(r.status) && new Date(r.start_datetime) >= new Date() ? `
            <div class="res-actions" style="margin-top:12px">
              <button class="btn-cancel" onclick="cancelRes('${r.id}')">取消する</button>
            </div>
          ` : ""}
        </div>
      `;
    }

    async function cancelRes(reservationId) {
      if (!confirm("予約を取消しますか？")) return;
      try {
        await liffApi.delete(`/liff/reservations/${reservationId}`, { reason: null });
        location.reload();
      } catch (err) {
        alert(err.message);
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
