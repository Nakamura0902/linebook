<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ・チャット管理 - LINE予約管理</title>
  <link rel="stylesheet" href="../shared/css/base.css?v=3">
  <link rel="stylesheet" href="css/admin.css?v=4">
  <style>
    .faq-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 900px) { .faq-layout { grid-template-columns: 1fr; } }

    .chat-list { display: flex; flex-direction: column; gap: 8px; }
    .chat-item {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .chat-item.active { border-color: var(--primary); background: #f0fdf4; }
    .chat-item.status-human { border-left: 3px solid var(--warning); }
    .chat-item.status-closed { opacity: 0.5; }
    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--gray-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .chat-meta { flex: 1; min-width: 0; }
    .chat-name { font-weight: 700; font-size: 14px; color: var(--gray-900); }
    .chat-preview { font-size: 12px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge {
      background: var(--danger); color: #fff;
      font-size: 11px; font-weight: 700;
      border-radius: 10px; padding: 2px 7px;
      flex-shrink: 0;
    }

    .chat-panel {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 500px;
      background: #fff;
    }
    .chat-panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--gray-50);
    }
    .chat-panel-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--gray-400); font-size: 14px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-start; }
    .msg.bot, .msg.admin { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble { background: var(--gray-100); color: var(--gray-900); border-radius: 16px 16px 16px 4px; }
    .msg.bot .msg-bubble { background: var(--primary); color: #fff; border-radius: 16px 16px 4px 16px; }
    .msg.admin .msg-bubble { background: #1d4ed8; color: #fff; border-radius: 16px 16px 4px 16px; }
    .msg-label { font-size: 10px; color: var(--gray-400); margin-top: 3px; text-align: right; }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: 8px;
    }
    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 14px;
      resize: none;
      height: 70px;
      font-family: inherit;
    }
    .chat-input-area textarea:focus { outline: none; border-color: var(--primary); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px;
    }
    .status-dot.bot { background: var(--primary); }
    .status-dot.human { background: var(--warning); }
    .status-dot.closed { background: var(--gray-400); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">LINE予約管理</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">ダッシュボード</a>
        <a href="reservations.html">予約一覧</a>
        <a href="calendar.html">カレンダー</a>
        <a href="customers.html">顧客管理</a>
        <a href="staff.html">スタッフ管理</a>
        <a href="menus.html">メニュー管理</a>
        <a href="shop.html">ショップ</a>
        <a href="faq.html" class="active">FAQ・チャット</a>
        <a href="settings.html">設定</a>
      </nav>
      <div class="sidebar-footer">
        <span id="admin-name"></span>
        <button class="btn btn-sm btn-outline" onclick="logout()">ログアウト</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>FAQ・チャット管理</h1>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openAddFaqModal()">＋ FAQ追加</button>
        </div>
      </div>

      <div class="faq-layout">
        <!-- FAQ管理 -->
        <div>
          <h2 style="font-size:16px;font-weight:700;margin-bottom:12px">FAQ一覧</h2>
          <div class="card">
            <div id="faq-table"><div class="loading">読み込み中...</div></div>
          </div>
        </div>

        <!-- チャット監視 -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <h2 style="font-size:16px;font-weight:700">チャット監視</h2>
            <div style="display:flex;gap:8px">
              <select id="chat-filter" onchange="loadChats()" style="font-size:13px;padding:5px 10px;border:1.5px solid var(--gray-300);border-radius:8px">
                <option value="">すべて</option>
                <option value="human">有人対応中</option>
                <option value="bot">Bot対応中</option>
                <option value="closed">終了済み</option>
              </select>
              <button class="btn btn-sm btn-outline" onclick="loadChats()">更新</button>
            </div>
          </div>
          <div class="chat-list" id="chat-list"><div class="loading">読み込み中...</div></div>

          <!-- チャット詳細パネル -->
          <div style="margin-top:16px">
            <div class="chat-panel" id="chat-panel">
              <div class="chat-panel-empty">チャットを選択してください</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- FAQ追加/編集モーダル -->
  <div class="modal-overlay" id="faq-modal" style="display:none">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h3 id="faq-modal-title">FAQ追加</h3>
        <button class="modal-close" onclick="closeModal('faq-modal')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="faq-edit-id">
        <div class="form-group">
          <label>質問 <span style="color:var(--danger)">*</span></label>
          <input type="text" id="faq-question" placeholder="営業時間を教えてください">
        </div>
        <div class="form-group">
          <label>回答 <span style="color:var(--danger)">*</span></label>
          <textarea id="faq-answer" rows="4" placeholder="営業時間は10:00〜20:00です（火曜定休）。"></textarea>
        </div>
        <div class="form-group">
          <label>キーワード（カンマ区切り）</label>
          <input type="text" id="faq-keywords" placeholder="営業時間, 時間, 何時, 定休">
          <small style="color:var(--gray-500);font-size:12px">これらのキーワードが含まれると即答します（Claude APIより優先）</small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('faq-modal')">キャンセル</button>
        <button class="btn btn-primary" onclick="saveFaq()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=3"></script>
  <script src="js/admin-layout.js?v=3"></script>
  <script>
    const storeId = getStoreId();
    let currentSessionId = null;

    async function loadFaq() {
      const items = await api.get(`/admin/stores/${storeId}/faq`);
      const el = document.getElementById("faq-table");
      if (!items.length) {
        el.innerHTML = '<div class="empty-state" style="padding:24px">FAQが登録されていません</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>質問</th><th>キーワード</th><th>状態</th><th></th></tr></thead>
          <tbody>
            ${items.map(f => `
              <tr style="${!f.is_active ? 'opacity:0.5' : ''}">
                <td>
                  <strong style="font-size:13px">${f.question}</strong>
                  <div style="font-size:12px;color:var(--gray-500);margin-top:3px;white-space:pre-wrap">${f.answer.slice(0,60)}${f.answer.length > 60 ? '…' : ''}</div>
                </td>
                <td style="font-size:12px;color:var(--gray-500)">${f.keywords || '-'}</td>
                <td><span class="badge ${f.is_active ? 'badge-confirmed' : 'badge-cancelled'}">${f.is_active ? '有効' : '無効'}</span></td>
                <td style="display:flex;gap:4px">
                  <button class="btn btn-sm btn-outline" onclick='openEditFaqModal(${JSON.stringify(f)})'>編集</button>
                  <button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="toggleFaq('${f.id}', ${f.is_active})">${f.is_active ? '無効化' : '有効化'}</button>
                  <button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="deleteFaq('${f.id}')">削除</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function openAddFaqModal() {
      document.getElementById("faq-modal-title").textContent = "FAQ追加";
      document.getElementById("faq-edit-id").value = "";
      ["faq-question", "faq-answer", "faq-keywords"].forEach(id =>
        document.getElementById(id).value = ""
      );
      openModal("faq-modal");
    }

    function openEditFaqModal(f) {
      document.getElementById("faq-modal-title").textContent = "FAQ編集";
      document.getElementById("faq-edit-id").value = f.id;
      document.getElementById("faq-question").value = f.question || "";
      document.getElementById("faq-answer").value = f.answer || "";
      document.getElementById("faq-keywords").value = f.keywords || "";
      openModal("faq-modal");
    }

    async function saveFaq() {
      const id = document.getElementById("faq-edit-id").value;
      const body = {
        question: document.getElementById("faq-question").value.trim(),
        answer: document.getElementById("faq-answer").value.trim(),
        keywords: document.getElementById("faq-keywords").value.trim() || null,
      };
      if (!body.question || !body.answer) { alert("質問と回答を入力してください"); return; }
      try {
        if (id) {
          await api.put(`/admin/stores/${storeId}/faq/${id}`, body);
        } else {
          await api.post(`/admin/stores/${storeId}/faq`, body);
        }
        closeModal("faq-modal");
        showToast("保存しました");
        loadFaq();
      } catch(e) { showToast(e.message, "error"); }
    }

    async function toggleFaq(id, current) {
      await api.put(`/admin/stores/${storeId}/faq/${id}`, { is_active: !current });
      showToast(current ? "無効化しました" : "有効化しました");
      loadFaq();
    }

    async function deleteFaq(id) {
      if (!confirm("このFAQを削除しますか？")) return;
      await api.delete(`/admin/stores/${storeId}/faq/${id}`);
      showToast("削除しました");
      loadFaq();
    }

    // ─── チャット管理 ───

    async function loadChats() {
      const filter = document.getElementById("chat-filter").value;
      const path = `/admin/stores/${storeId}/chats${filter ? "?status=" + filter : ""}`;
      const sessions = await api.get(path);
      const el = document.getElementById("chat-list");
      if (!sessions.length) {
        el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--gray-400);font-size:14px">チャットはありません</div>';
        return;
      }
      el.innerHTML = sessions.map(s => `
        <div class="chat-item status-${s.status} ${currentSessionId === s.id ? 'active' : ''}"
             onclick="openChat('${s.id}')">
          <div class="chat-avatar">👤</div>
          <div class="chat-meta">
            <div class="chat-name">
              <span class="status-dot ${s.status}"></span>
              ${s.display_name || 'ユーザー'}
            </div>
            <div class="chat-preview">${s.status === 'human' ? '有人対応中' : s.status === 'bot' ? 'Bot対応中' : '終了済み'}</div>
          </div>
          ${s.unread_count > 0 ? `<span class="unread-badge">${s.unread_count}</span>` : ''}
        </div>
      `).join('');
    }

    async function openChat(sessionId) {
      currentSessionId = sessionId;
      loadChats(); // アクティブ状態更新

      const data = await api.get(`/admin/stores/${storeId}/chats/${sessionId}/messages`);
      const s = data.session;
      const msgs = data.messages;

      const isHuman = s.status === "human";
      const isClosed = s.status === "closed";

      document.getElementById("chat-panel").innerHTML = `
        <div class="chat-panel-header">
          <div>
            <strong>${s.display_name || 'ユーザー'}</strong>
            <span class="badge ${s.status === 'human' ? 'badge-pending' : s.status === 'bot' ? 'badge-confirmed' : 'badge-cancelled'}" style="margin-left:8px">
              ${s.status === 'human' ? '有人対応中' : s.status === 'bot' ? 'Bot' : '終了'}
            </span>
          </div>
          <div style="display:flex;gap:6px">
            ${isHuman ? `<button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="closeChat('${s.id}')">対応終了</button>` : ''}
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          ${msgs.length ? msgs.map(m => `
            <div class="msg ${m.role}">
              <div>
                <div class="msg-bubble">${escapeHtml(m.content)}</div>
                <div class="msg-label">${m.role === 'admin' ? '管理者' : m.role === 'bot' ? 'AI' : 'ユーザー'} · ${formatTime(m.created_at)}</div>
              </div>
            </div>
          `).join('') : '<div style="text-align:center;color:var(--gray-400);font-size:13px">メッセージはまだありません</div>'}
        </div>
        ${isHuman && !isClosed ? `
          <div class="chat-input-area">
            <textarea id="reply-text" placeholder="返信メッセージを入力…"></textarea>
            <div style="display:flex;flex-direction:column;gap:6px">
              <button class="btn btn-primary" onclick="sendReply('${s.id}')">送信</button>
            </div>
          </div>
        ` : isClosed ? '' : `
          <div style="padding:10px 16px;background:var(--gray-50);border-top:1px solid var(--gray-200);font-size:12px;color:var(--gray-500)">
            Bot対応中です。有人対応に切り替えるにはユーザーが「スタッフ」などと送る必要があります。
          </div>
        `}
      `;

      // 最下部へスクロール
      const msgArea = document.getElementById("chat-messages");
      if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
    }

    async function sendReply(sessionId) {
      const text = document.getElementById("reply-text")?.value.trim();
      if (!text) return;
      try {
        await api.post(`/admin/stores/${storeId}/chats/${sessionId}/reply`, { text });
        showToast("送信しました");
        openChat(sessionId);
      } catch(e) { showToast(e.message, "error"); }
    }

    async function closeChat(sessionId) {
      if (!confirm("この対応を終了しますか？")) return;
      await api.put(`/admin/stores/${storeId}/chats/${sessionId}/close`);
      showToast("対応を終了しました");
      currentSessionId = null;
      document.getElementById("chat-panel").innerHTML = '<div class="chat-panel-empty">チャットを選択してください</div>';
      loadChats();
    }

    function escapeHtml(str) {
      if (!str) return "";
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function formatTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    // 定期更新（30秒ごとにチャット一覧を再取得）
    setInterval(loadChats, 30000);

    loadFaq().catch(e => showToast(e.message, "error"));
    loadChats().catch(e => showToast(e.message, "error"));
  </script>
</body>
</html>
